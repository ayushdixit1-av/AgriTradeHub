<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - AgriTradeHub</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="auth">

  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <span class="logo-icon">🌾</span>
        <span>AgriTradeHub</span>
      </a>
      <button class="mobile-toggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="mandi-prices.html">Mandi Prices</a>
        <a href="orders.html">Orders</a>
        <div class="nav-right">
          <a href="cart.html" class="cart-badge">
            🛒 <span class="cart-count">0</span>
          </a>
          <div class="auth-buttons"></div>
        </div>
      </nav>
    </div>
  </header>

  <div class="form-container">
    <h2>Join AgriTradeHub</h2>
    <p style="text-align:center;color:var(--text-light);margin-bottom:20px;">Create your account and start trading</p>
    <form id="register-form">
      <div class="role-toggle">
        <button type="button" class="active" data-role="customer">👤 Buyer</button>
        <button type="button" data-role="farmer">👨‍🌾 Farmer</button>
      </div>
      <div class="form-group">
        <label for="reg-name">Full Name</label>
        <input type="text" id="reg-name" placeholder="Enter your full name" required>
      </div>
      <div class="form-group">
        <label for="reg-email">Email Address</label>
        <input type="email" id="reg-email" placeholder="Enter your email" required>
      </div>
      <div class="form-group">
        <label for="reg-password">Password</label>
        <input type="password" id="reg-password" placeholder="Create a password (min 6 chars)" minlength="6" required>
      </div>
      <div class="form-group">
        <label for="reg-phone">Phone Number</label>
        <input type="tel" id="reg-phone" placeholder="Enter your phone number">
      </div>
      <button type="submit" class="btn btn-primary btn-lg btn-block">Create Account</button>
    </form>
    <div class="form-footer">
      Already have an account? <a href="login.html">Login here</a>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-inner">
      <div>
        <h3>🌾 AgriTradeHub</h3>
        <p style="opacity:0.8;font-size:0.9rem;">Empowering farmers, enriching lives.</p>
      </div>
      <div>
        <h3>Quick Links</h3>
        <a href="products.html">Browse Products</a>
        <a href="mandi-prices.html">Mandi Prices</a>
      </div>
      <div>
        <h3>Support</h3>
        <a href="#">Help Center</a>
        <a href="#">Contact Us</a>
      </div>
    </div>
    <div class="footer-bottom">&copy; 2024 AgriTradeHub</div>
  </footer>

  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
